<svg
xmlns="http://www.w3.org/2000/svg"
width="4000"
height="3000"
viewBox="0 0 4000 3000">

<rect
width="4000"
height="3000"
fill="#ece9df"/>

<!-- contour lines -->

<g
stroke="#444"
stroke-width="2"
fill="none"
opacity="0.45">

<path d="
M200 700
C600 500 1000 900 1400 700
S2200 400 2800 700
S3600 1000 3900 700
"/>

<path d="
M100 1100
C500 900 1000 1300 1600 1100
S2500 700 3300 1200
"/>

<path d="
M300 1600
C700 1450 1200 1800 1900 1500
S3000 1300 3800 1700
"/>

</g>

<!-- faults -->

<g
stroke="#111"
stroke-width="10"
fill="none"
opacity="0.9">

<path d="
M500 500
L1200 900
L1800 800
L2400 1300
L3200 1100
"/>

</g>

<!-- ruins -->

<g
stroke="#111"
fill="none">

<circle
cx="1200"
cy="900"
r="180"
stroke-width="5"/>

<circle
cx="2800"
cy="1600"
r="220"
stroke-width="5"/>

</g>

<!-- underground layer -->

<g
id="underground-layer"
opacity="0">

<path
d="M700 700 L1500 1200 L2400 1000"
stroke="#111"
stroke-width="4"
stroke-dasharray="12 10"
fill="none"/>

<circle
cx="2100"
cy="1700"
r="260"
stroke="#111"
stroke-width="2"
fill="none"/>

<text
x="2200"
y="1700"
font-size="28"
font-family="monospace"
fill="#111">

SUB-LAYER ACCESS

</text>

</g>

<!-- signal -->

<circle
class="signal"
cx="3000"
cy="1200"
r="10"
fill="#111"/>

</svg>