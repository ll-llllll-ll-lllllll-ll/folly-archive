<!-- index.html -->

<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>廢墟園林系列 · 遺構館</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<!-- attachment viewer -->

<div id="attachment-viewer" class="attachment-viewer">

  <div class="attachment-viewer-inner">

    <div class="attachment-hud">

  <!-- 左列：方向控制 -->
  <div class="hud-move">

    <div id="move-up" class="zoom-btn">[↑]</div>

    <div class="hud-middle">
      <div id="move-left" class="zoom-btn">[←]</div>
      <div id="move-right" class="zoom-btn">[→]</div>
    </div>

    <div id="move-down" class="zoom-btn">[↓]</div>

  </div>

  <!-- 右列：缩放 -->
  <div class="hud-zoom">
    <div id="zoom-in" class="zoom-btn">[+]</div>
    <div id="zoom-out" class="zoom-btn">[-]</div>
  </div>

</div>
    
    <div class="attachment-close">
      ×
    </div>

    <div class="attachment-meta">

      <div id="attachment-path" class="attachment-path"></div>

      <div id="attachment-filename" class="attachment-filename"></div>

      <div id="attachment-fragment"></div>

      <div id="attachment-type"></div>

    </div>

<div id="attachment-stage" class="attachment-stage">
  <div id="media-wrapper" class="media-wrapper"></div>
</div>

    <div
      id="attachment-desc"
      class="attachment-desc">
    </div>

  </div>

</div>

<!-- map -->

<div id="map"></div>

<!-- ui -->

<div class="ui">

  <div class="title">
    荒構錄 · 墟域圖
  </div>

  <div class="subtitle">
  </div>

</div>

<!-- hud -->

<div class="hud">

  <div class="hud-title">
    墟域圖
  </div>

  <div
    class="coords"
    id="coords">

    x:0000 y:0000

  </div>

</div>

<!-- drawer -->

<div
  id="archive-drawer"
  class="drawer">

<div class="drawer-header">

  <div
    class="drawer-close"
    onclick="closeDrawer()">
    ×
  </div>

</div>  
<div class="drawer-inner">

    <div id="drawer-content">

      <div class="drawer-body">
        select a site
      </div>

    </div>

  </div>

</div>

<!-- mask -->
<div id="drawer-mask" class="drawer-mask" onclick="closeDrawer()"></div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>
</html>
