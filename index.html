<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RUIN ATLAS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div id="map"></div>

<!-- ui -->
<div class="ui">

  <div class="title">RUIN ATLAS</div>

  <div class="subtitle">ARCHIVAL TOPOGRAPHIC SYSTEM</div>

  <div class="coords" id="coords">X:0000 Y:0000</div>

</div>

<!-- ✅ DRAWER（新增） -->
<div id="archive-drawer" class="drawer">

  <div class="drawer-inner">

    <div class="drawer-close" onclick="closeDrawer()">×</div>

    <div id="drawer-content">

      <div class="drawer-title">ARCHIVE FILE</div>
      <div class="drawer-body">SELECT A SITE</div>

    </div>

  </div>

</div>

<div id="drawer-mask" onclick="closeDrawer()"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
