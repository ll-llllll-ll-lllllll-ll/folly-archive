<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>RUIN ATLAS</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div id="map"></div>

<!-- overlays -->

<div class="paper"></div>
<div class="noise"></div>
<div class="scanlines"></div>
<div class="radar"></div>

<!-- ui -->

<div class="ui">

  <div class="title">
    RUIN ATLAS
  </div>

  <div class="subtitle">
    ARCHIVAL TOPOGRAPHIC SYSTEM
  </div>

  <div class="modes">

    <button data-mode="normal">
      NORMAL
    </button>

    <button data-mode="seismic">
      SEISMIC
    </button>

    <button data-mode="radiation">
      RADIATION
    </button>

    <button data-mode="archive">
      ARCHIVE
    </button>

  </div>

  <div class="coords" id="coords">
    X:0000 Y:0000
  </div>

</div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>
</html>
