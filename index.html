<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>folly archive</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div id="map"></div>

<!-- ui -->

<div class="ui">

  <div class="title">
    folly archive
  </div>

  <div class="subtitle">
    archival topographic system
  </div>

</div>

<!-- hud -->

<div class="hud">

  <div class="hud-title">
    ruin atlas
  </div>

  <div
  class="coords"
  id="coords">

    x:0000 y:0000

  </div>

</div>

<!-- drawer -->

<div id="archive-drawer" class="drawer">

  <div class="drawer-inner">

    <div
    class="drawer-close"
    onclick="closeDrawer()">

      ×

    </div>

    <div id="drawer-content">

      <div class="drawer-body">
        select a site
      </div>

    </div>

  </div>

</div>

<div
id="drawer-mask"
onclick="closeDrawer()">
</div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>
</html>
